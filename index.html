<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ハイキングコースエディタ</title>
    <link rel="icon"
        href="data:image/svg+xml,
            <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥾</text></svg>" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div id="map"></div>

    <div class="control-panel">
        <div class="control-section">
            <label>
                <input type="radio" name="mode" value="fileio" checked>
                <span class="selected">ファイルの入出力</span>
            </label>
            <label>
                <input type="radio" name="mode" value="course">
                <span>コースの作成・編集</span>
            </label>
            <label>
                <input type="radio" name="mode" value="photo">
                <span>コース用写真の選択</span>
            </label>
        </div>

        <!-- ファイルの入出力パネル -->
        <div id="fileIoPanel">
            <div class="io-controls">
                <div class="io-row">
                    <label for="excelInput" class="file-input-label">ポイントGPS(Excel)の読み込み</label>
                    <input type="file" id="excelInput" accept=".xlsx, .xls" />
                </div>
                <div class="io-row">
                    <label for="geojsonInput" class="file-input-label">ルート(GeoJSON)ファイルの読み込み</label>
                    <input type="file" id="geojsonInput" accept=".geojson" multiple />
                </div>
                <div class="io-row">
                    <button id="exportBtn">ハイキングコースのファイル出力</button>
                </div>
            </div>
        </div>

        <!-- コースの作成・編集パネル -->
        <div id="coursePanel" style="display: none;">
            <div class="course-section">
                <div class="course-field-row">
                    <label class="course-field-label">コース</label>
                    <select id="courseSelect" class="course-select"></select>
                </div>
                <input type="text" id="courseName" class="course-name-input" placeholder="コース名を入力">
                <div class="course-btn-row">
                    <button id="courseAddBtn">追加</button>
                    <button id="courseDeleteBtn">削除</button>
                </div>
            </div>
            <div class="point-list-section">
                <div class="point-list-header">
                    <span class="point-no-head">No.</span>
                    <span class="point-id-head">ポイントID</span>
                    <span class="point-act-head"></span>
                </div>
                <div id="pointListContainer"></div>
                <div class="point-add-row">
                    <button id="pointAddBtn">行を追加</button>
                </div>
            </div>
        </div>

        <!-- コース用写真の選択パネル -->
        <div id="photoPanel" style="display: none;">
            <div class="placeholder-panel">
                <p>コース用写真の選択</p>
                <p class="placeholder-note">（仕様検討中）</p>
            </div>
        </div>
    </div>

    <!-- GeoJSON読み込み種別選択モーダル -->
    <div id="geojsonImportModal" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <div class="modal-title">読み込む種別を選択</div>
            <div class="modal-row">
                <label class="modal-check-label">
                    <input type="checkbox" id="importPoint">
                    <span>ポイント</span>
                </label>
                <span id="importPointCount" class="modal-count">0点</span>
            </div>
            <div class="modal-row">
                <label class="modal-check-label">
                    <input type="checkbox" id="importRoute" checked>
                    <span>ルート</span>
                </label>
                <span id="importRouteCount" class="modal-count">0本</span>
            </div>
            <div class="modal-row">
                <label class="modal-check-label">
                    <input type="checkbox" id="importSpot" checked>
                    <span>スポット</span>
                </label>
                <span id="importSpotCount" class="modal-count">0個</span>
            </div>
            <div class="modal-actions">
                <button id="importConfirmBtn" class="modal-btn modal-btn-primary">読み込む</button>
                <button id="importCancelBtn" class="modal-btn">キャンセル</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script type="module" src="js/app.js"></script>
</body>

</html>
